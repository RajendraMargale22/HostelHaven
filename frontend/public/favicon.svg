<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0F1629"/>

  <!-- Roof -->
  <polygon points="32,10 10,30 54,30" fill="#FF5A3C"/>

  <!-- Chimney -->
  <rect x="40" y="14" width="7" height="13" rx="2" fill="#FF5A3C"/>

  <!-- Wall -->
  <rect x="14" y="29" width="36" height="23" rx="2" fill="#FFFFFF"/>

  <!-- Door -->
  <rect x="26" y="36" width="12" height="16" rx="3" fill="#0F1629"/>

  <!-- Door knob -->
  <circle cx="35.5" cy="44.5" r="1.5" fill="#FF5A3C"/>

  <!-- Left window -->
  <rect x="16.5" y="32.5" width="8" height="7" rx="1.5" fill="#E0F5F3"/>
  <line x1="20.5" y1="32.5" x2="20.5" y2="39.5" stroke="#0F1629" stroke-width="1"/>
  <line x1="16.5" y1="36" x2="24.5" y2="36" stroke="#0F1629" stroke-width="1"/>

  <!-- Right window -->
  <rect x="39.5" y="32.5" width="8" height="7" rx="1.5" fill="#E0F5F3"/>
  <line x1="43.5" y1="32.5" x2="43.5" y2="39.5" stroke="#0F1629" stroke-width="1"/>
  <line x1="39.5" y1="36" x2="47.5" y2="36" stroke="#0F1629" stroke-width="1"/>

  <!-- Ground line -->
  <line x1="10" y1="52" x2="54" y2="52" stroke="#FF5A3C" stroke-width="2.5" stroke-linecap="round"/>
</svg>